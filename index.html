  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자기소개 웹사이트</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      max-width: 500px;
      width: 90%;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 30px;
      text-align: center;
    }

    .profile {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .subtitle {
      color: gray;
      margin-bottom: 25px;
    }

    .section {
      background: #f9fafb;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      text-align: left;
    }

    a {
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

  </style>
</head>
